<article class="card border-0 discussion-card">
  <div class="card-body">
    <div class="d-flex align-items-start justify-content-between gap-2">
      <div>
        <h3 class="discussion-title mb-1">{{title}}</h3>
        <p class="discussion-meta mb-0">By {{author}} · {{createdAt}}</p>
      </div>
      <button class="btn btn-sm btn-outline-secondary discussion-toggle-btn" type="button" data-discussion-toggle="{{discussionId}}" aria-expanded="{{expandedAria}}">{{toggleLabel}}</button>
    </div>

    <div class="discussion-content-wrap {{collapsedClass}}" data-discussion-content="{{discussionId}}" {{hiddenAttr}}>
      {{discussionPreviewHtml}}
      <p class="discussion-description">{{description}}</p>
      {{discussionAttachmentsHtml}}

      <p class="discussion-comments-title mb-2">Comments</p>
      <div class="discussion-comment-list" data-comment-list="{{discussionId}}">{{commentsHtml}}</div>

      <form class="discussion-comment-form row g-2" data-comment-form="{{discussionId}}" novalidate>
        <div class="col-12">
          <label class="form-label" for="comment-content-{{discussionId}}">Add comment</label>
          <textarea id="comment-content-{{discussionId}}" name="content" class="form-control" rows="3" required></textarea>
        </div>
        <div class="col-12">
          <label class="form-label" for="comment-files-{{discussionId}}">Attachments (optional)</label>
          <input id="comment-files-{{discussionId}}" name="attachments" class="form-control" type="file" multiple />
        </div>
        <div class="col-12 d-flex justify-content-end">
          <button class="btn btn-sm btn-primary" type="submit">Send Comment</button>
        </div>
      </form>
    </div>
  </div>
</article>

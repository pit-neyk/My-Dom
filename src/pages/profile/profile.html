<section class="profile-page">
  <div class="row g-4 justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <h2 class="h5 mb-3">My Profile</h2>
          <form id="user-profile-form" class="row g-3">
            <div class="col-12 col-md-4">
              <label class="form-label">Full Name</label>
              <input class="form-control" name="full_name" value="{{fullName}}" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Email</label>
              <input class="form-control" name="email" type="email" value="{{email}}" readonly />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Phone</label>
              <input class="form-control" name="phone" value="{{phone}}" />
            </div>
            <div class="col-12">
              <button class="btn btn-primary" type="submit">Save Profile</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">Change Password</h2>
          <form id="user-password-form" class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">New Password</label>
              <input class="form-control" name="new_password" type="password" minlength="6" required />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Confirm New Password</label>
              <input class="form-control" name="confirm_password" type="password" minlength="6" required />
            </div>
            <div class="col-12">
              <button class="btn btn-primary" type="submit">Update Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
